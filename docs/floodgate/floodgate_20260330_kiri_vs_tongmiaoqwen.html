// =====================================================================
// Piece Constants

const PIECE_KANJI = {
  '歩':1, '香':2, '桂':3, '銀':4, '金':5, '角':6, '飛':7, '玉':8, '王':8,
  'と':11, '杏':12, '圭':13, '全':14, '馬':16, '龍':17, '竜':17,

};

                    11:'と',12:'杏',13:'圭',14:'全',16:'馬',17:'龍'};
const PROMOTE_MAP = {1:11, 2:12, 3:13, 4:14, 6:16, 7:17};
const UNPROMOTE = {11:1, 12:2, 13:3, 14:4, 16:6, 17:7};

// =====================================================================
// Parse KIF Moves
// =====================================================================
const FILE_KANJI = {'１':1,'２':2,'３':3,'４':4,'５':5,'６':6,'７':7,'８':8,'９':9};
const RANK_KANJI = {'一':1,'二':2,'三':3,'四':4,'五':5,'六':6,'七':7,'八':8,'九':9};

function parseKifMoves(kif) {
  const moves = [];
  const lines = kif.split('\n');
  let lastToFile = 0, lastToRank = 0;
  for (const line of lines) {
    const m = line.match(/^\s*(\d+)\s+(.+?)\s*\(\s*(\d+:\d+)\/(\d+:\d+:\d+)\)/);
    if (!m) continue;
    const num = parseInt(m[1]);
    const moveStr = m[2].trim();
    const time = m[3];
    const total = m[4];

    // Parse move
    let toFile, toRank, piece, fromFile, fromRank, isDrop = false, isPromote = false;

    if (moveStr.startsWith('同')) {
      // Same square as last move
      toFile = lastToFile;
      toRank = lastToRank;
      let rest = moveStr.substring(1).replace(/\s+/g, '');
      // Check for piece
      if (rest.startsWith('成') && rest.length >= 2) {
        // "成桂" etc - promoted piece name
        const composed = rest.substring(0, 2);
        if (PIECE_KANJI[composed]) {
          piece = PIECE_KANJI[composed];
          rest = rest.substring(2);
        } else {
          isPromote = true;
          rest = rest.substring(1);
          for (const [k, v] of Object.entries(PIECE_KANJI)) {
            if (rest.startsWith(k) && k.length === 1) { piece = v; rest = rest.substring(1); break; }
          }
        }
      } else {
        for (const [k, v] of Object.entries(PIECE_KANJI)) {
          if (rest.startsWith(k)) { piece = v; rest = rest.substring(k.length); break; }
        }
      }
      // Check trailing 成 or 打
      if (rest.includes('成')) isPromote = true;
      if (rest.includes('打')) isDrop = true;
      // From coords
      const fm = rest.match(/\((\d)(\d)\)/);
      if (fm) { fromFile = parseInt(fm[1]); fromRank = parseInt(fm[2]); }
    } else {
      // Normal move with target square
      const fc = moveStr[0];
      const rc = moveStr[1];
      if (FILE_KANJI[fc]) toFile = FILE_KANJI[fc];
      if (RANK_KANJI[rc]) toRank = RANK_KANJI[rc];

      let rest = moveStr.substring(2);
      // Check for composed promoted piece name like "成桂"
      if (rest.startsWith('成') && rest.length >= 2) {
        const composed = rest.substring(0, 2);
        if (PIECE_KANJI[composed]) {
          piece = PIECE_KANJI[composed];
          rest = rest.substring(2);
        } else {
          isPromote = true;
          rest = rest.substring(1);
          for (const [k, v] of Object.entries(PIECE_KANJI)) {
            if (rest.startsWith(k) && k.length === 1) { piece = v; rest = rest.substring(1); break; }
          }
        }
      } else {
        for (const [k, v] of Object.entries(PIECE_KANJI)) {
          if (rest.startsWith(k)) { piece = v; rest = rest.substring(k.length); break; }
        }
      }
      if (rest.includes('成')) isPromote = true;
      if (rest.includes('打')) isDrop = true;
      const fm = rest.match(/\((\d)(\d)\)/);
      if (fm) { fromFile = parseInt(fm[1]); fromRank = parseInt(fm[2]); }
    }

    if (toFile) { lastToFile = toFile; lastToRank = toRank; }

    moves.push({
      num, moveStr, time, total,
      toFile, toRank, piece, fromFile, fromRank,
      isDrop, isPromote,
      isSente: num % 2 === 1
    });
  }
  return moves;
}

  // Gote pieces (rows 0-2)
  board[0][0] = {p:2,s:-1}; board[0][1] = {p:3,s:-1}; board[0][2] = {p:4,s:-1};
  board[0][3] = {p:5,s:-1}; board[0][4] = {p:8,s:-1}; board[0][5] = {p:5,s:-1};
  board[0][6] = {p:4,s:-1}; board[0][7] = {p:3,s:-1}; board[0][8] = {p:2,s:-1};
  board[1][1] = {p:7,s:-1}; board[1][7] = {p:6,s:-1};
  for (let c=0;c<9;c++) board[2][c] = {p:1,s:-1};
  // Sente pieces (rows 6-8)
  for (let c=0;c<9;c++) board[6][c] = {p:1,s:1};
  board[7][1] = {p:6,s:1}; board[7][7] = {p:7,s:1};
  board[8][0] = {p:2,s:1}; board[8][1] = {p:3,s:1}; board[8][2] = {p:4,s:1};
  board[8][3] = {p:5,s:1}; board[8][4] = {p:8,s:1}; board[8][5] = {p:5,s:1};
  board[8][6] = {p:4,s:1}; board[8][7] = {p:3,s:1}; board[8][8] = {p:2,s:1};
  return board;
}

// =====================================================================
// Apply a KIF parsed move to board
// =====================================================================
function applyMove(board, hand, move) {
  const B = board.map(r => r.map(c => c ? {...c} : null));
  const H = {s:{...hand.s}, g:{...hand.g}};
  const side = move.isSente ? 's' : 'g';
  const sideVal = move.isSente ? 1 : -1;

  // Target square: board index
  const toR = move.toRank - 1;  // rank 1 -> row 0
  const toC = 9 - move.toFile;  // file 9 -> col 0, file 1 -> col 8

  if (move.isDrop) {
    // Drop piece from hand
    const base = UNPROMOTE[move.piece] || move.piece;
    const lbl = KOMA_LABEL[base];
    if (H[side][lbl] > 0) { H[side][lbl]--; if (H[side][lbl] === 0) delete H[side][lbl]; }
    B[toR][toC] = {p: move.piece, s: sideVal};
  } else {
    // Move from source
    const fromR = move.fromRank - 1;
    const fromC = 9 - move.fromFile;

    // Capture
    const target = B[toR][toC];
    if (target) {
      const base = UNPROMOTE[target.p] || target.p;
      const lbl = KOMA_LABEL[base];
      H[side][lbl] = (H[side][lbl] || 0) + 1;
    }

    const srcPiece = B[fromR][fromC];
    B[fromR][fromC] = null;

    let newPiece = srcPiece ? srcPiece.p : move.piece;
    if (move.isPromote && PROMOTE_MAP[newPiece]) {
      newPiece = PROMOTE_MAP[newPiece];
    }
    B[toR][toC] = {p: newPiece, s: sideVal};
  }

  return {board: B, hand: H};
}

// =====================================================================
// Build Views
// =====================================================================
const kifMoves = parseKifMoves(KIF_RAW);
const views = [];

(function buildViews() {
  let board = initialBoard();
  let hand = {s:{}, g:{}};

  views.push({
    board: board.map(r => r.map(c => c ? {...c} : null)),
    hand: {s:{...hand.s}, g:{...hand.g}},
    label: '初期局面',
    moveNum: 0,
    from: null, to: null
  });

  for (const mv of kifMoves) {
    const toR = mv.toRank - 1;
    const toC = 9 - mv.toFile;
    const fromR = mv.fromRank ? mv.fromRank - 1 : null;
    const fromC = mv.fromFile ? 9 - mv.fromFile : null;

    const result = applyMove(board, hand, mv);
    board = result.board;
    hand = result.hand;

    views.push({
      board: board.map(r => r.map(c => c ? {...c} : null)),
      hand: {s:{...hand.s}, g:{...hand.g}},
      label: mv.num + '手目 — ' + mv.moveStr.replace(/\(.*\)/, ''),
      moveNum: mv.num,
      from: (fromR !== null) ? {r: fromR, c: fromC} : null,
      to: {r: toR, c: toC}
    });
  }
})();

// =====================================================================
// Build Move Table
// =====================================================================
(function buildMoveTable() {
  const tbody = document.getElementById('move-tbody');
  for (const mv of kifMoves) {
    const tr = document.createElement('tr');
    tr.id = 'move-' + mv.num;
    tr.className = 'clickable';
    tr.onclick = () => goTo(mv.num);
    const cls = mv.isSente ? 'sente' : 'gote';
    tr.innerHTML = `<td class="num">${mv.num}</td><td class="${cls}">${mv.moveStr.replace(/\(.*\)/, '')}</td><td class="num">${mv.time}</td>`;
    tbody.appendChild(tr);
  }
})();

// =====================================================================
// SVG Board Rendering
// =====================================================================
let boardIdx = 0;
const SZ = 380;
const MARGIN = 20;
const CELL = (SZ - MARGIN*2) / 9;

function renderBoard(idx) {
  const v = views[idx];
  const {board, hand} = v;
  const svg = document.getElementById('board-svg');
  const ns = 'http://www.w3.org/2000/svg';
  svg.innerHTML = '';

  function g(tag, attrs, parent) {
    const el = document.createElementNS(ns, tag);
    Object.entries(attrs).forEach(([k,val]) => el.setAttribute(k, val));
    (parent || svg).appendChild(el);
    return el;
  }

  // Board background
  g('rect', {x:MARGIN,y:MARGIN,width:SZ-MARGIN*2,height:SZ-MARGIN*2,fill:'#2a2318',rx:'1'});

  // Grid lines
  for (let i=0; i<=9; i++) {
    const x = MARGIN + i*CELL, y = MARGIN + i*CELL;
    g('line', {x1:x,y1:MARGIN,x2:x,y2:SZ-MARGIN,stroke:'rgba(255,255,255,0.12)','stroke-width':'0.5'});
    g('line', {x1:MARGIN,y1:y,x2:SZ-MARGIN,y2:y,stroke:'rgba(255,255,255,0.12)','stroke-width':'0.5'});
  }

  // Highlight from/to
  if (v.from) {
    const cx = MARGIN + v.from.c*CELL, cy = MARGIN + v.from.r*CELL;
    g('rect', {x:cx,y:cy,width:CELL,height:CELL,fill:'rgba(200,169,110,0.12)'});
  }
  if (v.to) {
    const cx = MARGIN + v.to.c*CELL, cy = MARGIN + v.to.r*CELL;
    g('rect', {x:cx,y:cy,width:CELL,height:CELL,fill:'rgba(200,169,110,0.25)'});
  }

  // Pieces
  for (let r=0; r<9; r++) {
    for (let c=0; c<9; c++) {
      const cell = board[r][c];
      if (!cell) continue;
      const cx = MARGIN + c*CELL + CELL/2;
      const cy = MARGIN + r*CELL + CELL/2;
      const isGote = cell.s === -1;
      const lbl = KOMA_LABEL[cell.p] || '?';
      const isPromoted = cell.p >= 11;
      const textCol = isPromoted ? '#c8a96e' : (isGote ? '#9ab8cc' : '#e8e4dc');
      const t = g('text', {
        x:cx, y:cy + CELL*0.3,
        'text-anchor':'middle',
        'dominant-baseline':'middle',
        fill: textCol,
        'font-size': CELL * 0.55,
        'font-family': 'Yu Mincho, YuMincho, 游明朝, Hiragino Mincho ProN, serif',
        transform: isGote ? `rotate(180,${cx},${cy})` : ''
      });
      t.textContent = lbl;
    }
  }

  // Coordinate labels
  const colLabels = ['９','８','７','６','５','４','３','２','１'];
  const rowLabels = ['一','二','三','四','五','六','七','八','九'];
  for (let i=0; i<9; i++) {
    g('text', {x:MARGIN+i*CELL+CELL/2, y:MARGIN-4, 'text-anchor':'middle',
      'font-size':'7', fill:'rgba(255,255,255,0.3)', 'font-family':'var(--font-mono)'}).textContent = colLabels[i];
    g('text', {x:SZ-MARGIN+4, y:MARGIN+i*CELL+CELL/2, 'text-anchor':'start',
      'dominant-baseline':'middle', 'font-size':'7', fill:'rgba(255,255,255,0.3)',
      'font-family':'Yu Mincho, YuMincho, 游明朝, Hiragino Mincho ProN, serif'}).textContent = rowLabels[i];
  }

  // Move counter
  document.getElementById('move-counter').textContent = v.label;

  // Captured pieces
  const fmtCaps = (cap) => {
    const parts = Object.entries(cap).filter(([,n]) => n > 0).map(([k,n]) => n > 1 ? k + n : k);
    return parts.length ? parts.join(' ') : 'なし';
  };
  document.getElementById('cap-sente').textContent = fmtCaps(hand.s);
  document.getElementById('cap-gote').textContent = fmtCaps(hand.g);

  // Highlight active row
  document.querySelectorAll('#move-table tbody tr.move-active').forEach(
    tr => tr.classList.remove('move-active'));
  const activeRow = document.getElementById('move-' + v.moveNum);
  if (activeRow) {
    activeRow.classList.add('move-active');
    activeRow.scrollIntoView({behavior:'smooth', block:'nearest'});
  }
}

// =====================================================================
// Navigation
// =====================================================================
function goTo(idx) {
  if (idx < 0) idx = 0;
  if (idx >= views.length) idx = views.length - 1;
  boardIdx = idx;
  renderBoard(idx);
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft')  { e.preventDefault(); goTo(boardIdx - 1); }
  if (e.key === 'ArrowRight') { e.preventDefault(); goTo(boardIdx + 1); }
  if (e.key === 'Home')       { e.preventDefault(); goTo(0); }
  if (e.key === 'End')        { e.preventDefault(); goTo(views.length - 1); }
});

// Initial render
goTo(0);
</script>
</body>
</html>
